<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Item Capture</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        /* Visual indicator for current step */
        .step-indicator {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .step {
            padding: 10px 20px;
            border-radius: 20px;
            background: #333;
            font-weight: bold;
            transition: 0.3s;
            flex: 1;
            margin: 0 5px;
        }
        .step.active {
            background: #007bff;
            color: white;
            box-shadow: 0 0 10px #007bff;
        }

        #reader {
            width: 100%;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
            background: #000;
        }

        button {
            padding: 12px 18px;
            margin: 8px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-warning { background-color: #ffc107; color: #000; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
        }
        th, td {
            border: 1px solid #444;
            padding: 10px;
            text-align: left;
        }
        th { background-color: #2c2c2c; }
        
        #barcode-input { position: absolute; opacity: 0; top: -100px; }
    </style>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="container">
    <h2>Item Batch Capture</h2>
    
    <div class="step-indicator">
        <div id="step-qr" class="step active">1. SCAN QR</div>
        <div id="step-ean" class="step">2. SCAN EAN</div>
    </div>

    <button id="camera-btn" class="btn-success">Open Phone Camera</button>
    <button id="reset-seq-btn" class="btn-warning">Reset Sequence</button>
    
    <div id="reader"></div>

    <input type="text" id="barcode-input" autofocus>

    <div style="margin-top: 20px;">
        <button id="export-btn" class="btn-primary">Export to Excel</button>
        <button id="clear-btn" class="btn-danger">Clear All Data</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Item (QR)</th>
                <th>Serial/EAN</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="data-table"></tbody>
    </table>
</div>

<script>
    const STORAGE_KEY = 'warehouse_scan_data';
    let scans = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let state = 'WAITING_FOR_QR'; // WAITING_FOR_QR or WAITING_FOR_EAN
    
    const qrStepEl = document.getElementById('step-qr');
    const eanStepEl = document.getElementById('step-ean');
    const inputEl = document.getElementById('barcode-input');
    const tableEl = document.getElementById('data-table');
    const readerEl = document.getElementById('reader');
    
    let html5QrCode = null;

    function updateUI() {
        // Update visual steps
        if (state === 'WAITING_FOR_QR') {
            qrStepEl.classList.add('active');
            eanStepEl.classList.remove('active');
        } else {
            qrStepEl.classList.remove('active');
            eanStepEl.classList.add('active');
        }

        // Render Table
        tableEl.innerHTML = scans.map(s => `
            <tr>
                <td>${s.qr}</td>
                <td>${s.ean || '<span style="color:orange">Pending...</span>'}</td>
                <td>${s.time}</td>
            </tr>
        `).reverse().join(''); // Show newest first
    }

    function handleScan(value) {
        if (!value) return;
        const now = new Date().toLocaleTimeString();

        if (state === 'WAITING_FOR_QR') {
            // Start a new entry
            scans.push({ qr: value, ean: null, time: now });
            state = 'WAITING_FOR_EAN';
        } else {
            // Fill the EAN for the last entry
            const lastEntry = scans[scans.length - 1];
            lastEntry.ean = value;
            lastEntry.time = now;
            state = 'WAITING_FOR_QR';
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(scans));
        updateUI();
        inputEl.value = '';
    }

    // --- PDA Scanner Event ---
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            handleScan(inputEl.value);
        }
    });

    // --- Phone Camera Setup ---
    document.getElementById('camera-btn').addEventListener('click', function() {
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
            readerEl.style.display = 'block';
            this.textContent = "Close Camera";
            
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                (text) => {
                    handleScan(text);
                    // Add a tiny delay to prevent reading the same code twice
                    html5QrCode.pause();
                    setTimeout(() => html5QrCode.resume(), 1500);
                }
            );
        } else {
            html5QrCode.stop().then(() => {
                html5QrCode = null;
                readerEl.style.display = 'none';
                this.textContent = "Open Phone Camera";
            });
        }
    });

    // --- Controls ---
    document.getElementById('reset-seq-btn').addEventListener('click', () => {
        state = 'WAITING_FOR_QR';
        // Remove the incomplete entry if it exists
        if (scans.length > 0 && !scans[scans.length - 1].ean) {
            scans.pop();
        }
        updateUI();
    });

    document.getElementById('export-btn').addEventListener('click', () => {
        if (scans.length === 0) return;
        const ws = XLSX.utils.json_to_sheet(scans);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inventory");
        XLSX.writeFile(wb, `ScanLog_${new Date().toISOString().split('T')[0]}.xlsx`);
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
        if (confirm("Delete everything?")) {
            scans = [];
            state = 'WAITING_FOR_QR';
            localStorage.removeItem(STORAGE_KEY);
            updateUI();
        }
    });

    // Auto-focus logic for PDA
    setInterval(() => { if (!html5QrCode) inputEl.focus(); }, 1000);
    updateUI();

</script>
</body>
</html>
